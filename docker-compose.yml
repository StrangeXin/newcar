services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: newcar
      POSTGRES_USER: newcar
      POSTGRES_PASSWORD: newcar_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
